<!DOCTYPE html>
<html lang="en">
<head>
    <title>Food Blog</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
    <style>
        * {
            font-family:Arial, Helvetica, sans-serif;
        }
        #leftside {
            float:left;
            width: 30%;
            min-height: 1200px;
            background-color:rgb(77, 192, 154);
        }
        #rightside {
            float:left;
            width: 70%;
            min-height: 1200px;
            background-color:rgb(238, 226, 192);
            position:relative;
        }
        #container {
            background-color:rgba(255, 255, 255, 0.85);
            position: absolute;
            top: 15%;
            left: 15%;
            min-width: 1100px;
            min-height: 1050px;
            border-radius: 0.7em;
        }
        header {
            height: 50px;
            background-color:rgba(231, 229, 229, 0.5);
            font-size: 2.75em;
            padding:0.5em;
            color:rgb(216, 150, 7);
        }
        header span {
            font-family: 'Sacramento', cursive;
        }
        main {
            position: relative;
        }
        main h2 {
            position: absolute;
            left: 20%;
            top: 30px;
            margin: 25px 0 200px 50px;
            color:rgb(60, 190, 160);
            text-transform: uppercase;
        }
        main #photos img {
            margin: 0.75em;
            border: 0.85em solid rgb(255, 255, 255);
        }
        section#blogposts {
            position: absolute;
            left: 20%;
            top: 70px;
            padding: 50px;
        }
        main .post {
            margin: 25px;
            padding: 25px;
            border: 2px solid rgba(83, 78, 58, 0.6);
            border-radius: 0.5em;
        }
        footer {
            position: absolute;
            bottom: 0;
            height: 50px;
            width: 100%;
            text-align: center;
            font-size: 0.85em;
        }
        
        .author-overlay{
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .author-modal{
            width: 320px;
            background: #111;
            color: #fff;
            border-radius: 10px;
            padding: 18px 18px 14px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        .author-close{
            position: absolute;
            top: 10px;
            right: 12px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .author-name{
            margin: 0 0 10px;
            font-size: 22px;
        }

        .author-bio{
            margin-top: 10px;
            line-height: 1.35;
            font-size: 13px;
        }

        .avatar{
            width: 36px;
            height: 36px;
            vertical-align: middle;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>

    

</head>
<body>
    <aside id="leftside"></aside>
    <aside id="rightside"></aside>
    <div id="container">
    <header><span>{{ blogTitle }}</span></header>

    <main>
    
    <aside id="photos">
        <img :src="foodImage.src" :alt="foodImage.alt" :width="foodImage.width">
    </aside>
    <h2>{{sectionTitle}}</h2>
    
    
    <section id="blogposts">
        <post-item v-for="(p, index) in posts" :key="index"
             :post="p" @show-author="showAuthor"></post-item>
    </section>

    </main>

    
    <div v-if="showModal" class="author-overlay" @click.self="closeModal">
        <div class="author-modal">
            <button class="author-close" type="button" @click.stop="closeModal">X</button>

            <h3 class="author-name">{{ selectedAuthor.name }}</h3>
            <p><strong>Foodie Level:</strong> {{ selectedAuthor.level }}</p>
            <p class="author-bio">{{ selectedAuthor.bio }}</p>
        </div>
    </div>

    <footer>
        &copy; Copyright FOOD BLOG
    </footer>
    </div>

    <template id="post-template">
        <div class="post">
            <img class="avatar" :src="post.img" :alt="profile" @click="$emit('show-author', post)">
            <span class="author">{{ post.author }}</span> — 
            <span class="date">{{ post.date }}</span>
            <span class="reply">{{ post.reply }}</span>
            <p>{{ post.text }}</p>
        </div>
    </template>
    

<script>
    Vue.component("post-item", {
        props: ['post'],
        template: "#post-template"
    });
     
    new Vue({
        el: '#container',
        data: {
            blogTitle: "Food Blog",
            sectionTitle: "Comments",
            foodImage: {
                src: "images/chili.jpg",
                alt: "White Chicken Chili",
                width: "180"
            },
            posts: [
                {
                    author: "Brianna",
                    date: "February 18, 2021 @ 3:30 pm",
                    reply: "REPLY",
                    text: "Was amazing! My Walmart didn’t have coriander in stock and didn’t have ground cumin. I used serrano instead of jalapeño. It was just like my favorite tortilla soup from BJs. I am sending this recipe to my family. I want everyone to try it!",
                    img: "images/profile.png",
                    level: "Novice",
                    bio: "Food enthusiast. Love to cook and experiment. Into organic, fat-free, sugar-free stuff!"
                },
                {
                    author: "LINH",
                    date: "February 15, 2021 @ 9:45 am",
                    reply: "REPLY",
                    text: "I just made this soup today and it’s so tasty! didn’t have corn at home but still turned out very good.  It’s a winner!  I made beef chili for my parents; but since my dad has gout he can’t eat beef; this white chicken chili is perfect for him.  Thank you Lisa!",
                    img: "images/profile.png",
                    level: "Novice",
                    bio: "Love food! Grew up with meat and potatoes. Recently venture outside my comfort zone. Loving everything I have been eating so far. Thai is my favorite at this time."
                },
                {
                    author: "CATHERINE LEONARDO",
                    date: "February 13, 2021 @ 12:50 am",
                    reply: "REPLY",
                    text: "I LOVE this White Chicken Chili! You are right, it is satiating meal—delicious with toasted bread. Refreshingly different taste than any chicken chili I’ve made in the past. I made it exactly as written and added some chopped zucchini, carrots, and celery. Instead of shredding the chicken, I chopped it into small pieces. It freezes very well. Will be an all-time favorite, for sure.",
                    img: "images/profile.png",
                    level: "Novice",
                    bio: "I have to say I never was the adventurous type until 2 years ago. My boyfriend, who is of Japanese background, exposed me to other cultural food and I have never look back since!"
                },
                {
                    author: "KALI",
                    date: "February 13, 2021 @ 11:31 am",
                    reply: "REPLY",
                    text: "This recipe is dynamite! My partner usually won’t eat beans but he finished the whole pot (darn was hoping to have some for leftovers haha). This is crowd-pleaser that I am going to add to my regular recipe rotation. Thanks so much, Lisa!",
                    img: "images/profile.png",
                    level: "Novice",
                    bio: "Food is my passion. So is cooking. I love to experiment and try new things. I have to admit I'm a food whore! Invite me over for dinner and I'll be there!"
                }
            ],
            showModal: false,
            selectedAuthor: {
                name: "",
                level: "",
                bio: ""
            }
            },
            methods: {
                showAuthor(post) {
                    this.selectedAuthor.name = post.author;
                    this.selectedAuthor.level = post.level;
                    this.selectedAuthor.bio = post.bio;
                    this.showModal = true;
                },
                closeModal() {
                    this.showModal = false;
                }
            }
    });
</script>
</body>
</html>
